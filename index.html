<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALEX SAHIL CHOUDHARY</title>

<meta property="og:title" content="ALEX SAHIL CHOUDHARY">
<meta property="og:description" content="Cyber Security • Hacker Style • Alex Sahil">
<meta property="og:image" content="https://alex-sahil.github.io/banner.png">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:#fff;
height:100vh;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
padding:20px;
}

.profile{
width:220px;
height:220px;
border-radius:50%;
border:4px solid #00ff55;
box-shadow:
0 0 20px #00ff55,
0 0 60px #00ff55;
object-fit:cover;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

.glitch{

font-size:55px;
font-weight:900;
margin-top:25px;
color:#fff;
text-shadow:
3px 3px red,
-3px -3px cyan;

animation:glitch .8s infinite;

}

@keyframes glitch{

0%{
transform:translate(0);
}

25%{
transform:translate(-2px,2px);
}

50%{
transform:translate(2px,-2px);
}

75%{
transform:translate(-2px,-2px);
}

100%{
transform:translate(0);
}

}

.status{

margin-top:20px;
font-size:20px;
color:#00ff55;

}

.typing{

margin-top:15px;
font-size:17px;
color:#ffffff;
min-height:25px;

}

.social{

margin-top:30px;

}

.social a{

text-decoration:none;
color:#00ff55;
border:2px solid #00ff55;
padding:12px 25px;
margin:8px;
display:inline-block;
border-radius:30px;
transition:.4s;

}

.social a:hover{

background:#00ff55;
color:#000;

}
